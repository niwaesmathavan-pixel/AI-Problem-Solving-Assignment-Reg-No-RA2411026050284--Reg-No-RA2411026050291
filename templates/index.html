<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Problem Solving Assignment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>AI Problem Solving Assignment</h1>
        <p>Name: Niwaes M | Reg No: RA2411026050284 | Class: AIML-E</p>
    </header>

    <main>
        <section class="problem-container" id="ttt-section">
            <h2>Problem 1: Tic-Tac-Toe AI (Minimax & Alpha-Beta)</h2>
            <div class="ttt-board" id="ttt-board">
                <!-- Squares generated by JS -->
            </div>
            <div class="stats" id="ttt-stats">
                <p id="ttt-status">Your turn! You are X.</p>
                <button onclick="resetTTT()">Restart Game</button>
                <div class="debug-stats">
                    <strong>Minimax:</strong> <span id="mm-nodes">-</span> nodes | <span id="mm-time">-</span> sec<br>
                    <strong>Alpha-Beta:</strong> <span id="ab-nodes">-</span> nodes | <span id="ab-time">-</span> sec
                </div>
            </div>
        </section>

        <section class="problem-container" id="sudoku-section">
            <h2>Problem 6: Sudoku Solver (CSP)</h2>
            <div class="sudoku-grid" id="sudoku-grid">
                <!-- Inputs generated by JS -->
            </div>
            <div class="stats">
                <p id="sudoku-status">Fill in the grid or try the default!</p>
                <button onclick="solveSudoku()">Solve using CSP</button>
                <button onclick="resetSudoku()">Reset Grid</button>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
